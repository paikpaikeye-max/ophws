<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안과 진료 지원 워크스테이션 v3.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        :root { font-size: 18px; } 
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; }
        .sidebar { width: 280px; background: #1e293b; height: 100vh; flex-shrink: 0; }
        .content { flex: 1; height: 100vh; overflow-y: auto; padding: 2rem; word-break: keep-all; }
        .nav-item { display: flex; align-items: center; padding: 1rem 1.5rem; color: #94a3b8; cursor: pointer; border-radius: 12px; margin: 0.25rem 1rem; }
        .nav-item.active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-base { width: 100%; padding: 0.75rem; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; font-size: 1rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-sidebar { width: 220px; background: #f1f5f9; border-right: 1px solid #e2e8f0; padding: 1.5rem 0; }
        .modal-tab { padding: 0.75rem 1.5rem; font-size: 0.85rem; font-weight: 700; color: #64748b; cursor: pointer; }
        .modal-tab.active { background: white; color: #4f46e5; border-left: 4px solid #4f46e5; }
        table th { background: #f8fafc; padding: 12px; border: 1px solid #e2e8f0; font-size: 0.75rem; }
        table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .price-final-bold { font-weight: 900; color: #1e293b; font-size: 1.2rem; }
        .price-final-blue { font-weight: 900; color: #4f46e5; font-size: 1.2rem; }
        .hidden { display: none; }
        .copy-btn { background: rgba(255, 255, 255, 0.2); border-radius: 8px; padding: 4px 10px; font-size: 0.7rem; font-weight: 700; transition: all 0.2s; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(255, 255, 255, 0.3); cursor: pointer; }
        .copy-btn:hover { background: rgba(255, 255, 255, 0.4); }

        /* 토스트 메시지 애니메이션 */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 600; font-size: 0.9rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="flex">

    <div id="toast">복사되었습니다</div>

    <aside class="sidebar flex flex-col shadow-2xl">
        <div class="p-8 text-white">
            <h1 class="text-2xl font-black tracking-tighter italic">OPHTH<span class="text-indigo-400">WS</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Version 3.7 Stable</p>
        </div>
        <nav class="flex-1 space-y-1">
            <div onclick="switchTab('schedule')" id="tab-schedule" class="nav-item active font-bold"><i class="fa-solid fa-calendar-alt mr-3 w-5"></i>주사 일정 계산</div>
            <div onclick="switchTab('cost')" id="tab-cost" class="nav-item font-bold"><i class="fa-solid fa-coins mr-3 w-5"></i>주사 비용 계산기</div>
        </nav>
        <div class="p-6 border-t border-slate-700">
            <button onclick="openModal()" class="w-full flex items-center justify-center p-3 rounded-xl bg-slate-700 text-white font-bold text-sm hover:bg-slate-600 transition-all"><i class="fa-solid fa-gear mr-2"></i> 시스템 설정</button>
        </div>
    </aside>

    <main class="content">
        <section id="page-schedule" class="space-y-8">
            <header><h2 class="text-3xl font-black text-slate-800">주사 일정 계산기</h2></header>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-card p-8 border-t-8 border-indigo-500 shadow-lg">
                    <h3 class="font-black text-slate-400 text-xs mb-4 uppercase tracking-widest">Mode 1. 오늘 내원 기준</h3>
                    <div class="space-y-6">
                        <input type="text" id="m1_lastDate" placeholder="이전 주사일 (모든 날짜 표기형식을 자동 인식합니다)" class="input-base" oninput="runM1()">
                        <div class="flex gap-4">
                            <div class="flex-1 bg-slate-50 p-6 rounded-2xl border text-center"><p class="text-xs text-slate-400 font-bold mb-2 uppercase">현재 경과 주수</p><p id="m1_weeksPassed" class="text-5xl font-black text-indigo-600">-</p></div>
                            <div class="flex-1 space-y-2"><p class="text-xs text-slate-400 font-bold uppercase">향후 계획 (주)</p><input type="number" id="m1_plan" class="input-base text-3xl font-black text-center h-20" oninput="runM1()"></div>
                        </div>
                        <div id="m1_res" class="bg-indigo-600 p-6 rounded-2xl text-white shadow-xl hidden font-black text-xl"></div>
                    </div>
                </div>
                <div class="glass-card p-8 border-t-8 border-slate-400 shadow-lg">
                    <h3 class="font-black text-slate-400 text-xs mb-4 uppercase tracking-widest">Mode 2. 특정일 기준</h3>
                    <div class="space-y-6">
                        <input type="text" id="m2_baseDate" placeholder="기준일자 설정" class="input-base bg-amber-50" oninput="runM2()">
                        <input type="text" id="m2_lastDate" placeholder="이전 주사일" class="input-base" oninput="runM2()">
                        <div class="flex gap-4">
                            <div class="flex-1 bg-slate-50 p-6 rounded-2xl border text-center"><p class="text-xs text-slate-400 font-bold mb-2 uppercase">기준일 주수</p><p id="m2_weeksPassed" class="text-5xl font-black text-slate-600">-</p></div>
                            <div class="flex-1 space-y-2"><p class="text-xs text-slate-400 font-bold uppercase">기준일+n주</p><input type="number" id="m2_plan" class="input-base text-3xl font-black text-center h-20" oninput="runM2()"></div>
                        </div>
                        <div id="m2_res" class="bg-slate-700 p-6 rounded-2xl text-white shadow-xl hidden font-black text-xl"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-cost" class="hidden space-y-8">
            <header class="flex justify-between items-end">
                <h2 class="text-3xl font-black text-slate-800">주사 비용 계산기</h2>
                <div id="hospitalTag" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full font-black text-sm border border-indigo-200 uppercase tracking-tighter"></div>
            </header>
            <div class="glass-card p-8">
                <div class="flex gap-4 mb-8">
                    <select id="diagSelect" class="input-base font-black bg-slate-50 text-indigo-700 text-xl border-2 h-20">
                        <option value="AMD">AMD</option><option value="DME">DME</option><option value="BRVO">BRVO</option><option value="CRVO">CRVO</option><option value="mCNV">mCNV</option><option value="Uveitis">Uveitis</option>
                    </select>
                    <button onclick="calculateCost()" class="bg-indigo-600 text-white px-12 rounded-2xl font-black text-xl hover:bg-indigo-700 shadow-2xl transition-all whitespace-nowrap active:scale-95">계산 실행</button>
                </div>
                <div id="costArea" class="min-h-[500px]"></div>
            </div>
        </section>
    </main>

    <div id="settingsModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-6xl max-h-[85vh] overflow-hidden flex shadow-2xl border-2 border-slate-300">
            <aside class="modal-sidebar">
                <div onclick="switchModalTab('sched-set')" id="m-tab-sched-set" class="modal-tab active">주사 일정 계산</div>
                <div onclick="switchModalTab('cost-set')" id="m-tab-cost-set" class="modal-tab">주사 비용 계산기</div>
            </aside>
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                    <h2 id="modalTitle" class="font-black text-lg text-slate-800 uppercase italic">Configuration</h2>
                    <button onclick="closeModal()" class="text-4xl text-slate-300 hover:text-slate-500">&times;</button>
                </div>
                <div class="p-8 overflow-y-auto flex-1">
                    <div id="m-page-sched-set" class="space-y-6">
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                            <h3 class="font-bold text-slate-700 mb-4">날짜 출력 형식 설정</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <label class="flex items-center gap-2 cursor-pointer bg-white px-4 py-3 rounded-xl border-2"><input type="radio" name="dateFormat" value="YYYY-MM-DD" onchange="saveDateSetting()"><span>2025-12-12</span></label>
                                <label class="flex items-center gap-2 cursor-pointer bg-white px-4 py-3 rounded-xl border-2"><input type="radio" name="dateFormat" value="YYYY.MM.DD" onchange="saveDateSetting()"><span>2025.12.12</span></label>
                                <label class="flex items-center gap-2 cursor-pointer bg-white px-4 py-3 rounded-xl border-2"><input type="radio" name="dateFormat" value="YYYY/MM/DD" onchange="saveDateSetting()"><span>2025/12/12</span></label>
                                <label class="flex items-center gap-2 cursor-pointer bg-white px-4 py-3 rounded-xl border-2"><input type="radio" name="dateFormat" value="YY-MM-DD" onchange="saveDateSetting()"><span>25-12-12</span></label>
                                <label class="flex items-center gap-2 cursor-pointer bg-white px-4 py-3 rounded-xl border-2"><input type="radio" name="dateFormat" value="YY.MM.DD" onchange="saveDateSetting()"><span>25.12.12</span></label>
                                <label class="flex items-center gap-2 cursor-pointer bg-white px-4 py-3 rounded-xl border-2"><input type="radio" name="dateFormat" value="YY/MM/DD" onchange="saveDateSetting()"><span>25/12/12</span></label>
                            </div>
                        </div>
                    </div>
                    <div id="m-page-cost-set" class="hidden space-y-8">
                        <div class="grid grid-cols-2 gap-6 bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                            <div><label class="block text-[10px] font-black text-indigo-400 mb-1 uppercase tracking-widest">기관 분류</label>
                                <select id="set_hospRate" class="input-base font-bold" onchange="autoCalcAll50()">
                                    <option value="0.6">상급종합(60%)</option><option value="0.5">종합병원(50%)</option><option value="0.4">안과병원(40%)</option><option value="0.3">의원(30%)</option>
                                </select>
                            </div>
                            <div><label class="block text-[10px] font-black text-indigo-400 mb-1 uppercase tracking-widest">시술료 원가</label><input type="number" id="set_injFee" class="input-base font-bold" oninput="autoCalcAll50()"></div>
                        </div>
                        <div class="overflow-x-auto border-2 rounded-2xl">
                            <table class="w-full">
                                <thead>
                                    <tr><th>정렬</th><th>약제명</th><th>원가</th><th>급여지원</th><th>비급지원</th><th>지원</th><th>삭제</th></tr>
                                </thead>
                                <tbody id="drugBody"></tbody>
                            </table>
                        </div>
                        <div id="matrixContainer" class="overflow-x-auto border-2 rounded-2xl"></div>
                        <div class="flex justify-end"><button onclick="addDrug()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-indigo-700">+ New Drug</button></div>
                    </div>
                </div>
                <div class="p-6 border-t bg-slate-50 flex gap-4">
                    <button onclick="handleExport()" class="px-6 py-4 bg-slate-800 text-white rounded-2xl font-bold text-xs shadow-md">설정 내보내기</button>
                    <label class="flex-1 px-6 py-4 bg-white border-2 border-slate-200 text-slate-500 rounded-2xl font-bold text-xs text-center cursor-pointer shadow-sm">설정 불러오기<input type="file" class="hidden" onchange="handleImport(event)"></label>
                    <button onclick="saveConfig()" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-700 transition-all">설정 저장 및 적용</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cfg = {
            hospRate: 0.6, injFee: 124241, dateFormat: 'YYYY-MM-DD',
            drugs: [
                { name: 'Avastin', price: 43756, payR: 0, payN: 0, is50: false, hasProgram: false, color: '#1e293b' },
                { name: 'Lucentis', price: 578362, payR: 173509, payN: 210000, is50: true, hasProgram: true, color: '#2563eb' },
                { name: 'Eylea', price: 496118, payR: 148835, payN: 210000, is50: false, hasProgram: true, color: '#059669' },
                { name: 'Vabysmo', price: 696197, payR: 208859, payN: 240000, is50: false, hasProgram: true, color: '#7c3aed' },
                { name: 'Beovu', price: 773660, payR: 232098, payN: 300000, is50: false, hasProgram: true, color: '#db2777' },
                { name: 'HD Eylea', price: 795000, payR: 238500, payN: 280000, is50: false, hasProgram: true, color: '#059669' }
            ],
            matrix: {
                "AMD": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"R", "Beovu":"R", "HD Eylea":"R" },
                "DME": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"R", "Beovu":"R", "HD Eylea":"R" },
                "BRVO": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"R", "Beovu":"X", "HD Eylea":"X" },
                "CRVO": { "Avastin":"X", "Lucentis":"O", "Eylea":"O", "Vabysmo":"O", "Beovu":"X", "HD Eylea":"X" },
                "mCNV": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"X", "Beovu":"X", "HD Eylea":"X" },
                "Uveitis": { "Avastin":"X", "Lucentis":"X", "Eylea":"X", "Vabysmo":"X", "Beovu":"X", "HD Eylea":"X" }
            }
        };

        const diags = ["AMD", "DME", "BRVO", "CRVO", "mCNV", "Uveitis"];

        window.onload = () => {
            const saved = localStorage.getItem('opht_cfg_v37');
            if(saved) cfg = JSON.parse(saved);
            updateUI();
            const dateOption = document.querySelector(`input[name="dateFormat"][value="${cfg.dateFormat}"]`);
            if(dateOption) dateOption.checked = true;
            switchModalTab('sched-set');
        };

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("복사되었습니다: " + text);
            });
        }

        function switchTab(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + id).classList.remove('hidden');
            document.getElementById('tab-' + id).classList.add('active');
        }

        function switchModalTab(id) {
            document.querySelectorAll('[id^="m-page-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('m-page-' + id).classList.remove('hidden');
            document.getElementById('m-tab-' + id).classList.add('active');
            document.getElementById('modalTitle').innerText = id === 'cost-set' ? '주사 비용 계산기' : '주사 일정 계산';
        }

        function updateUI() {
            const labels = {"0.6":"상급종합","0.5":"종합병원","0.4":"안과병원","0.3":"의원"};
            document.getElementById('hospitalTag').innerText = `${labels[cfg.hospRate]} ${Math.round(cfg.hospRate*100)}%`;
            document.getElementById('set_hospRate').value = cfg.hospRate;
            document.getElementById('set_injFee').value = cfg.injFee;
        }

        function saveDateSetting() { cfg.dateFormat = document.querySelector('input[name="dateFormat"]:checked').value; }

        function formatDate(dt) {
            let y = dt.getFullYear(); let m = String(dt.getMonth() + 1).padStart(2, '0'); let d = String(dt.getDate()).padStart(2, '0'); let yy = String(y).slice(-2);
            switch(cfg.dateFormat) {
                case 'YYYY-MM-DD': return `${y}-${m}-${d}`;
                case 'YYYY.MM.DD': return `${y}.${m}.${d}`;
                case 'YYYY/MM/DD': return `${y}/${m}/${d}`;
                case 'YY-MM-DD': return `${yy}-${m}-${d}`;
                case 'YY.MM.DD': return `${yy}.${m}.${d}`;
                case 'YY/MM/DD': return `${yy}/${m}/${d}`;
                default: return `${y}-${m}-${d}`;
            }
        }

        function parseDt(s){let c=s.replace(/[^0-9]/g,'');if(c.length<6)return null;let y=c.length===8?c.substr(0,4):'20'+c.substr(0,2);let m=c.length===8?c.substr(4,2):c.substr(2,2);let d=c.length===8?c.substr(6,2):c.substr(4,2);let dt=new Date(`${y}-${m}-${d}`);return isNaN(dt.getTime())?null:dt;}
        
        function runM1(){
            const last=parseDt(document.getElementById('m1_lastDate').value);
            if(!last) return;
            const d=Math.floor((new Date()-last)/(1000*60*60*24));
            document.getElementById('m1_weeksPassed').innerText=(d/7).toFixed(1);
            const p=document.getElementById('m1_plan').value;
            const r=document.getElementById('m1_res');
            if(p){
                let n=new Date(); n.setDate(n.getDate()+(p*7));
                const fDate = formatDate(n);
                r.innerHTML = `<div class="flex items-center justify-center gap-4"><span class="font-black text-xl">${fDate} (${['일','월','화','수','목','금','토'][n.getDay()]})</span><button onclick="copyToClipboard('${fDate}')" class="copy-btn"><i class="fa-regular fa-copy"></i> 복사</button></div>`;
                r.classList.remove('hidden');
            } else r.classList.add('hidden');
        }

        function runM2(){
            const b=parseDt(document.getElementById('m2_baseDate').value);
            const l=parseDt(document.getElementById('m2_lastDate').value);
            if(b&&l){
                const d=Math.floor((b-l)/(1000*60*60*24));
                document.getElementById('m2_weeksPassed').innerText=(d/7).toFixed(1);
            }
            const p=document.getElementById('m2_plan').value;
            const r=document.getElementById('m2_res');
            if(b&&p){
                let n=new Date(b); n.setDate(n.getDate()+(p*7));
                const fDate = formatDate(n);
                r.innerHTML = `<div class="flex items-center justify-center gap-4"><span class="font-black text-xl">${fDate} (${['일','월','화','수','목','금','토'][n.getDay()]})</span><button onclick="copyToClipboard('${fDate}')" class="copy-btn"><i class="fa-regular fa-copy"></i> 복사</button></div>`;
                r.classList.remove('hidden');
            } else r.classList.add('hidden');
        }

        function calculateCost() {
            const diag = document.getElementById('diagSelect').value;
            const area = document.getElementById('costArea');
            let html = `<table class="w-full"><thead><tr><th width="15%">약제명</th><th width="15%">구분</th><th width="35%">급여 기준 (본인부담)</th><th width="35%">비급여 기준</th></tr></thead><tbody>`;
            cfg.drugs.forEach(drug => {
                const matrixStatus = cfg.matrix[diag] ? cfg.matrix[diag][drug.name] : "X";
                if(drug.name === 'Avastin') {
                    const p = Math.round(drug.price + cfg.injFee);
                    html += `<tr><td class="font-black text-left pl-8" style="color:${drug.color}; border-left: 8px solid ${drug.color}">${drug.name}</td><td class="text-slate-400 font-bold">허가 외</td><td>-</td><td class="price-final-bold text-2xl">${p.toLocaleString()}원</td></tr>`;
                    return;
                }
                if(matrixStatus === "X") return;
                const isR = matrixStatus === "R";
                html += `<tr><td class="font-black text-left pl-8" style="color:${drug.color}; border-left: 8px solid ${drug.color}">${drug.name}</td><td class="${isR?'text-blue-600':'text-orange-500'} font-bold">${isR?'급여가능':'허가O급여X'}</td><td>${isR?genPrice(diag, drug, "R"):'-'}</td><td>${genPrice(diag, drug, "O")}</td></tr>`;
            });
            area.innerHTML = html + `</tbody></table>`;
        }

        function genPrice(diag, drug, mode) {
            const isSupp = (drug.hasProgram && !(diag === 'AMD' && mode === 'R'));
            let dR = (mode === "R") ? (diag==="AMD"?0.1:cfg.hospRate) : 1.0;
            let iR = (diag==="AMD" && mode === "R") ? 0.1 : cfg.hospRate;
            const total = Math.round((drug.price * dR) + (cfg.injFee * iR));
            let payback = 0;
            if(isSupp) {
                if(drug.is50 && mode === "R") payback = Math.round((drug.price * dR) * 0.5);
                else payback = (mode === "R") ? drug.payR : drug.payN;
            }
            const final = total - payback;
            if (isSupp && payback > 0) return `<div class="text-xs text-slate-400 line-through">${total.toLocaleString()}원</div><div class="price-final-blue text-2xl">${final.toLocaleString()}원</div>`;
            return `<div class="price-final-bold text-2xl">${total.toLocaleString()}원</div>`;
        }

        function openModal() { document.getElementById('settingsModal').style.display = 'flex'; renderDrugs(); renderMatrix(); }
        function closeModal() { document.getElementById('settingsModal').style.display = 'none'; }
        
        function renderDrugs() {
            const b = document.getElementById('drugBody'); b.innerHTML = '';
            cfg.drugs.forEach((d, i) => { 
                b.innerHTML += `<tr>
                    <td><div class="flex flex-col"><i class="fa-solid fa-chevron-up cursor-pointer hover:text-indigo-600" onclick="moveDrug(${i}, -1)"></i><i class="fa-solid fa-chevron-down cursor-pointer hover:text-indigo-600" onclick="moveDrug(${i}, 1)"></i></div></td>
                    <td><div class="flex items-center gap-2"><input type="color" value="${d.color}" onchange="cfg.drugs[${i}].color=this.value;renderDrugs();"><input type="text" value="${d.name}" class="w-full font-black text-center" style="color:${d.color}" onchange="cfg.drugs[${i}].name=this.value"></div></td>
                    <td><input type="number" value="${d.price}" class="w-full text-center" oninput="cfg.drugs[${i}].price=parseInt(this.value)"></td>
                    <td class="bg-indigo-50/50">
                        <div class="flex flex-col items-center justify-center">
                            <span class="text-[9px] text-indigo-500 font-black leading-none mb-1">50%</span>
                            <div class="flex items-center gap-2">
                                <input type="checkbox" ${d.is50?'checked':''} onchange="toggle50(${i}, this.checked)" class="w-4 h-4">
                                <input type="number" value="${d.payR}" class="w-24 text-center bg-white border border-indigo-200 rounded p-1 text-sm font-bold" oninput="cfg.drugs[${i}].payR=parseInt(this.value)">
                            </div>
                        </div>
                    </td>
                    <td><input type="number" value="${d.payN}" class="w-full text-center" oninput="cfg.drugs[${i}].payN=parseInt(this.value)"></td>
                    <td><input type="checkbox" ${d.hasProgram?'checked':''} onchange="cfg.drugs[${i}].hasProgram=this.checked" class="w-5 h-5"></td>
                    <td><button onclick="deleteDrug(${i})" class="text-red-500 font-bold text-xl">&times;</button></td>
                </tr>`; 
            });
        }

        function deleteDrug(i) {
            const drugName = cfg.drugs[i].name;
            cfg.drugs.splice(i, 1);
            diags.forEach(diag => { if(cfg.matrix[diag]) delete cfg.matrix[diag][drugName]; });
            renderDrugs(); renderMatrix();
        }

        function toggle50(i, chk) { cfg.drugs[i].is50 = chk; if(chk) { cfg.drugs[i].payR = Math.round((cfg.drugs[i].price * cfg.hospRate) * 0.5); } renderDrugs(); }
        function moveDrug(idx, dir) { const newIdx = idx+dir; if(newIdx>=0 && newIdx<cfg.drugs.length) { [cfg.drugs[idx], cfg.drugs[newIdx]] = [cfg.drugs[newIdx], cfg.drugs[idx]]; renderDrugs(); } }
        
        function renderMatrix() {
            const c = document.getElementById('matrixContainer');
            let h = `<table class="w-full"><thead><tr><th>약제</th>` + diags.map(d => `<th>${d}</th>`).join('') + `</tr></thead><tbody>`;
            cfg.drugs.forEach(drug => { if(drug.name === 'Avastin') return; h += `<tr><td class="font-black bg-slate-50 text-left pl-4" style="color:${drug.color}">${drug.name}</td>` + diags.map(diag => {
                const st = cfg.matrix[diag] ? cfg.matrix[diag][drug.name] : "X";
                let color = 'text-black'; if(st==='R') color='text-blue-600'; if(st==='O') color='text-red-600';
                return `<td><select onchange="if(!cfg.matrix['${diag}'])cfg.matrix['${diag}']={};cfg.matrix['${diag}']['${drug.name}']=this.value;renderMatrix();" class="text-xs border rounded w-full font-bold ${color}"><option value="R" ${st==='R'?'selected':''}>급여</option><option value="O" ${st==='O'?'selected':''}>허가O급여X</option><option value="X" ${st==='X'?'selected':''}>허가X</option></select></td>`;
            }).join('') + `</tr>`; });
            c.innerHTML = h + `</tbody></table>`;
        }

        function addDrug() { const n = "신규"+cfg.drugs.length; cfg.drugs.push({ name:n, price:0, payR:0, payN:0, is50:false, hasProgram:true, color: '#1e293b' }); diags.forEach(d => { if(!cfg.matrix[d])cfg.matrix[d]={}; cfg.matrix[d][n]="X"; }); renderDrugs(); renderMatrix(); }
        function saveConfig() { cfg.hospRate = parseFloat(document.getElementById('set_hospRate').value); cfg.injFee = parseInt(document.getElementById('set_injFee').value); localStorage.setItem('opht_cfg_v37', JSON.stringify(cfg)); updateUI(); closeModal(); alert("저장되었습니다."); }
        function handleExport() { const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `OphtWorkstation_v37.json`; a.click(); }
        function handleImport(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => { cfg = JSON.parse(ev.target.result); saveConfig(); location.reload(); }; r.readAsText(f); }
        function autoCalcAll50() { cfg.drugs.forEach(d => { if(d.is50) d.payR = Math.round((d.price * cfg.hospRate) * 0.5); }); renderDrugs(); }
    </script>
</body>
</html>
