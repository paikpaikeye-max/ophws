<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안과 진료 지원 워크스테이션 v2.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        
        :root { font-size: 18px; } 
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; line-height: 1.6; }
        
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .input-base { width: 100%; padding: 0.6rem; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; font-size: 1rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; overflow-y: auto; align-items: center; justify-content: center; }
        
        table th { background-color: #f8fafc; padding: 12px; border: 1px solid #e2e8f0; font-size: 0.8rem; color: #64748b; font-weight: 700; text-transform: uppercase; }
        table td { padding: 8px; border: 1px solid #e2e8f0; text-align: center; font-size: 0.9rem; }
        
        .price-strike { text-decoration: line-through; color: #94a3b8; font-size: 0.8rem; }
        .price-final { font-weight: 900; color: #4338ca; font-size: 1.1rem; }
        
        .drag-btn { cursor: pointer; color: #cbd5e1; transition: color 0.1s; }
        .drag-btn:hover { color: #6366f1; }

        /* 컬러 피커 커스텀 */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #e2e8f0; border-radius: 6px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-6 border-b-2 border-slate-200 pb-4">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase italic">Ophth<span class="text-indigo-600">Workstation</span> v2.8</h1>
                <p class="text-slate-500 font-bold text-sm">Compact Config & Stable Storage</p>
            </div>
            <button onclick="openModal()" class="text-slate-400 hover:text-indigo-600 transition-colors p-2">
                <i class="fa-solid fa-gear text-3xl"></i>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="card p-6 border-l-8 border-indigo-500 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 text-base uppercase">Mode 1. 오늘 기준</h3>
                    <div class="space-y-4">
                        <input type="text" id="m1_lastDate" placeholder="이전 주사일 (20241212)" class="input-base border-2" oninput="runM1()">
                        <div class="flex gap-4">
                            <div class="flex-1 bg-slate-50 p-4 rounded-xl text-center border">
                                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">현재 주수</p>
                                <p id="m1_weeksPassed" class="text-3xl font-black text-indigo-600">-</p>
                            </div>
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">계획(주)</p>
                                <input type="number" id="m1_plan" class="input-base border-2 text-center text-xl font-bold h-16" oninput="runM1()">
                            </div>
                        </div>
                        <div id="m1_res" class="bg-indigo-600 p-4 rounded-xl text-white text-center hidden font-bold text-lg shadow-lg"></div>
                    </div>
                </div>

                <div class="card p-6 border-l-8 border-slate-500 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 text-base uppercase">Mode 2. 특정일 기준</h3>
                    <div class="space-y-4">
                        <input type="text" id="m2_baseDate" placeholder="기준일자 (내원일)" class="input-base border-2 bg-amber-50" oninput="runM2()">
                        <input type="text" id="m2_lastDate" placeholder="이전 주사일" class="input-base border-2" oninput="runM2()">
                        <div class="flex gap-4">
                            <div class="flex-1 bg-slate-50 p-4 rounded-xl text-center border">
                                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1 text-slate-400">기준일 주수</p>
                                <p id="m2_weeksPassed" class="text-3xl font-black text-slate-600">-</p>
                            </div>
                            <div class="flex-1">
                                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">기준+n주</p>
                                <input type="number" id="m2_plan" class="input-base border-2 text-center text-xl font-bold h-16" oninput="runM2()">
                            </div>
                        </div>
                        <div id="m2_res" class="bg-slate-700 p-4 rounded-xl text-white text-center hidden font-bold text-lg shadow-lg"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="card overflow-hidden h-full">
                    <div class="bg-slate-800 px-8 py-5 flex justify-between items-center text-white">
                        <h2 class="font-bold text-lg"><i class="fa-solid fa-coins mr-3 text-indigo-400"></i> 비용 시뮬레이션</h2>
                        <span id="hospitalTag" class="text-xs font-bold bg-white/10 px-3 py-1.5 rounded-full border border-white/20">-</span>
                    </div>
                    <div class="p-6">
                        <div class="flex gap-4 mb-8">
                            <select id="diagSelect" class="input-base font-bold bg-slate-50 text-indigo-700 text-lg border-2 h-16">
                                <option value="AMD">Wet AMD (산특 10%)</option>
                                <option value="DME">DME (당뇨황반부종)</option>
                                <option value="BRVO">BRVO (망막정맥분지폐쇄)</option>
                                <option value="CRVO">CRVO (망막정맥중심폐쇄)</option>
                                <option value="mCNV">Myopic CNV (근시성)</option>
                            </select>
                            <button onclick="calculateCost()" class="bg-indigo-600 text-white px-10 rounded-xl font-black text-xl hover:bg-indigo-700 shadow-xl transition-all">계산</button>
                        </div>
                        <div id="costArea" class="overflow-x-auto min-h-[500px]">
                            <p class="text-center text-slate-300 py-32 text-lg">진단명을 선택하고 계산 버튼을 눌러주세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal flex">
        <div class="bg-white rounded-3xl w-full max-w-6xl max-h-[95vh] overflow-hidden flex flex-col m-2 shadow-2xl border border-slate-300">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <h2 class="font-black text-lg text-slate-800 uppercase tracking-tight">System Settings</h2>
                <button onclick="closeModal()" class="text-4xl text-slate-300 hover:text-slate-500 transition-colors">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 space-y-6">
                <div class="grid grid-cols-2 gap-6 bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 uppercase text-indigo-400">의료기관 분류</label>
                        <select id="set_hospRate" class="input-base font-bold border-2" onchange="autoCalcAll50()">
                            <option value="0.6">상급종합(60%)</option>
                            <option value="0.5">종합병원(50%)</option>
                            <option value="0.4">안과병원(40%)</option>
                            <option value="0.3">의원(30%)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold mb-1 uppercase text-indigo-400">시술료(원가)</label>
                        <input type="number" id="set_injFee" class="input-base font-bold border-2" oninput="autoCalcAll50()">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-black text-sm text-indigo-600 uppercase italic">Drug Master Data</h3>
                        <button onclick="addDrug()" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg font-bold text-xs">+ 약제 추가</button>
                    </div>
                    <div class="overflow-x-auto border-2 rounded-2xl">
                        <table class="w-full border-collapse">
                            <thead>
                                <tr>
                                    <th width="6%">정렬</th>
                                    <th width="20%">약제명 & 색상</th>
                                    <th width="15%">약제가</th>
                                    <th width="24%">급여지원 (50%)</th>
                                    <th width="15%">비급지원</th>
                                    <th width="8%">지원O</th>
                                    <th width="8%">삭제</th>
                                </tr>
                            </thead>
                            <tbody id="drugBody"></tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <h3 class="font-black text-sm text-indigo-600 mb-3 uppercase italic">Approval Matrix</h3>
                    <div id="matrixContainer" class="overflow-x-auto border-2 rounded-2xl"></div>
                </div>
            </div>

            <div class="p-4 border-t flex gap-3 bg-slate-50">
                <button onclick="handleExport()" class="px-5 py-3 bg-slate-800 text-white rounded-xl font-bold text-xs">설정 내보내기</button>
                <label class="px-5 py-3 bg-white border-2 border-slate-300 text-slate-600 rounded-xl font-bold text-xs cursor-pointer text-center flex-1 shadow-sm">
                    설정 불러오기<input type="file" id="importFile" class="hidden" onchange="handleImport(event)">
                </label>
                <button onclick="saveConfig()" class="flex-[2] bg-indigo-600 text-white py-3 rounded-xl font-black text-lg shadow-lg hover:bg-indigo-700">설정 저장 및 적용</button>
            </div>
        </div>
    </div>

    <script>
        let cfg = {
            hospRate: 0.6,
            injFee: 124241,
            drugs: [
                { name: 'Avastin', price: 43756, payR: 0, payN: 0, is50: false, hasProgram: false, color: '#1e293b' },
                { name: 'Lucentis', price: 578362, payR: 173509, payN: 210000, is50: true, hasProgram: true, color: '#2563eb' },
                { name: 'Eylea', price: 496118, payR: 148835, payN: 210000, is50: false, hasProgram: true, color: '#059669' },
                { name: 'Vabysmo', price: 696197, payR: 208859, payN: 240000, is50: false, hasProgram: true, color: '#7c3aed' },
                { name: 'Beovu', price: 773660, payR: 232098, payN: 300000, is50: false, hasProgram: true, color: '#db2777' },
                { name: 'HD Eylea', price: 795000, payR: 238500, payN: 280000, is50: false, hasProgram: true, color: '#059669' }
            ],
            matrix: {
                "AMD": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"R", "Beovu":"R", "HD Eylea":"R" },
                "DME": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"R", "Beovu":"R", "HD Eylea":"R" },
                "BRVO": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"R", "Beovu":"X", "HD Eylea":"X" },
                "CRVO": { "Avastin":"X", "Lucentis":"O", "Eylea":"O", "Vabysmo":"O", "Beovu":"X", "HD Eylea":"X" },
                "mCNV": { "Avastin":"X", "Lucentis":"R", "Eylea":"R", "Vabysmo":"X", "Beovu":"X", "HD Eylea":"X" }
            }
        };

        const diags = ["AMD", "DME", "BRVO", "CRVO", "mCNV"];

        window.onload = () => {
            const saved = localStorage.getItem('opht_cfg_v28');
            if(saved) cfg = JSON.parse(saved);
            updateUI();
        };

        function updateUI() {
            const labels = {"0.6":"상급종합","0.5":"종합병원","0.4":"안과병원","0.3":"의원"};
            document.getElementById('hospitalTag').innerText = `${labels[cfg.hospRate]} (${Math.round(cfg.hospRate*100)}%)`;
        }

        // --- 일정 계산기 ---
        function parseDt(s){let c=s.replace(/[^0-9]/g,'');if(c.length<6)return null;let y=c.length===8?c.substr(0,4):'20'+c.substr(0,2);let m=c.length===8?c.substr(4,2):c.substr(2,2);let d=c.length===8?c.substr(6,2):c.substr(4,2);let dt=new Date(`${y}-${m}-${d}`);return isNaN(dt.getTime())?null:dt;}
        function runM1(){const l=parseDt(document.getElementById('m1_lastDate').value);if(!l)return;const d=Math.floor((new Date()-l)/(1000*60*60*24));document.getElementById('m1_weeksPassed').innerText=(d/7).toFixed(1);const p=document.getElementById('m1_plan').value;const r=document.getElementById('m1_res');if(p){let n=new Date();n.setDate(n.getDate()+(p*7));r.innerText=n.toLocaleDateString()+" ("+['일','월','화','수','목','금','토'][n.getDay()]+")";r.classList.remove('hidden');}else r.classList.add('hidden');}
        function runM2(){const b=parseDt(document.getElementById('m2_baseDate').value);const l=parseDt(document.getElementById('m2_lastDate').value);if(b&&l){const d=Math.floor((b-l)/(1000*60*60*24));document.getElementById('m2_weeksPassed').innerText=(d/7).toFixed(1);}const p=document.getElementById('m2_plan').value;const r=document.getElementById('m2_res');if(b&&p){let n=new Date(b);n.setDate(n.getDate()+(p*7));r.innerText=n.toLocaleDateString()+" ("+['일','월','화','수','목','금','토'][n.getDay()]+")";r.classList.remove('hidden');}else r.classList.add('hidden');}

        // --- 비용 계산기 ---
        function calculateCost() {
            const diag = document.getElementById('diagSelect').value;
            const area = document.getElementById('costArea');
            let html = `<table class="w-full">
                <thead><tr>
                    <th width="18%">약제명</th><th width="12%">구분</th>
                    <th width="35%">급여 기준 (본인부담)</th><th width="35%">비급여 기준</th>
                </tr></thead><tbody>`;

            cfg.drugs.forEach(drug => {
                const status = cfg.matrix[diag][drug.name];
                if(drug.name === 'Avastin') {
                    const price = Math.round(drug.price + cfg.injFee);
                    html += `<tr>
                        <td class="font-black text-left pl-6" style="color:${drug.color}">${drug.name}</td>
                        <td class="text-slate-400 font-bold">허가 외</td><td>-</td>
                        <td class="font-black text-slate-800 text-xl">${price.toLocaleString()}원</td>
                    </tr>`;
                    return;
                }
                if(status === "X") return;
                const maxS = (status === "R") ? "급여가능" : "비급여";
                const sCls = (status === "R") ? "text-blue-600" : "text-orange-500";
                html += `<tr>
                    <td class="font-black text-left pl-6" style="color:${drug.color}">${drug.name}</td>
                    <td class="${sCls} font-bold">${maxS}</td>
                    <td>${status === "R" ? genPrice(diag, drug, "R") : "-"}</td>
                    <td>${genPrice(diag, drug, "O")}</td>
                </tr>`;
            });
            area.innerHTML = html + `</tbody></table>`;
        }

        function genPrice(diag, drug, mode) {
            const isSupp = (drug.hasProgram && !(diag === 'AMD' && mode === 'R'));
            let dR = (mode === "R") ? (diag==="AMD"?0.1:cfg.hospRate) : 1.0;
            let iR = (diag==="AMD" && mode === "R") ? 0.1 : cfg.hospRate;
            const total = Math.round((drug.price * dR) + (cfg.injFee * iR));
            let payback = 0;
            if(isSupp) {
                if(drug.is50 && mode === "R") payback = Math.round((drug.price * dR) * 0.5);
                else payback = (mode === "R") ? drug.payR : drug.payN;
            }
            const final = total - payback;
            return (isSupp && payback > 0) 
                ? `<div class="price-strike">${total.toLocaleString()}원</div><div class="price-final text-xl">${final.toLocaleString()}원</div>`
                : `<div class="font-bold text-slate-700 text-xl">${total.toLocaleString()}원</div>`;
        }

        // --- 설정 화면 ---
        function openModal() { 
            document.getElementById('settingsModal').style.display = 'flex'; 
            document.getElementById('set_hospRate').value = cfg.hospRate;
            document.getElementById('set_injFee').value = cfg.injFee;
            renderDrugs(); 
            renderMatrix(); 
        }
        function closeModal() { document.getElementById('settingsModal').style.display = 'none'; }

        function renderDrugs() {
            const b = document.getElementById('drugBody'); b.innerHTML = '';
            cfg.drugs.forEach((d, i) => {
                b.innerHTML += `
                    <tr>
                        <td class="bg-slate-50">
                            <div class="flex flex-col gap-1 items-center">
                                <i class="fa-solid fa-chevron-up drag-btn text-sm" onclick="moveDrug(${i}, -1)"></i>
                                <i class="fa-solid fa-chevron-down drag-btn text-sm" onclick="moveDrug(${i}, 1)"></i>
                            </div>
                        </td>
                        <td>
                            <div class="flex items-center gap-2 justify-center">
                                <input type="color" value="${d.color || '#1e293b'}" onchange="updateDrug(${i}, 'color', this.value)">
                                <input type="text" value="${d.name}" class="font-black text-sm w-32 border-b text-center" style="color:${d.color}" onchange="updateDrug(${i}, 'name', this.value)">
                            </div>
                        </td>
                        <td><input type="number" value="${d.price}" class="w-full text-center font-bold" oninput="updateDrug(${i}, 'price', this.value)"></td>
                        <td class="bg-indigo-50">
                            <div class="flex items-center gap-2 px-2">
                                <input type="checkbox" ${d.is50?'checked':''} onchange="toggle50(${i}, this.checked)" class="w-5 h-5">
                                <input type="number" value="${d.payR}" id="payR_${i}" class="w-full text-center bg-white border border-indigo-200 rounded p-1 font-bold" oninput="updateDrug(${i}, 'payR', this.value)">
                            </div>
                        </td>
                        <td><input type="number" value="${d.payN}" class="w-full text-center font-bold" oninput="updateDrug(${i}, 'payN', this.value)"></td>
                        <td><input type="checkbox" class="w-5 h-5" ${d.hasProgram?'checked':''} onchange="updateDrug(${i}, 'hasProgram', this.checked)"></td>
                        <td><button onclick="cfg.drugs.splice(${i},1);renderDrugs();renderMatrix();" class="text-red-400 font-bold text-xl">&times;</button></td>
                    </tr>`;
            });
        }

        function updateDrug(i, k, v) { 
            if(['price','payR','payN'].includes(k)) v = parseInt(v) || 0;
            cfg.drugs[i][k] = v; 
            if(k === 'color') renderDrugs();
        }

        function toggle50(i, chk) {
            cfg.drugs[i].is50 = chk;
            if(chk) calc50(i);
            renderDrugs();
        }

        function calc50(i) {
            const hRate = parseFloat(document.getElementById('set_hospRate').value);
            cfg.drugs[i].payR = Math.round((cfg.drugs[i].price * hRate) * 0.5);
        }

        function autoCalcAll50() {
            cfg.hospRate = parseFloat(document.getElementById('set_hospRate').value);
            cfg.injFee = parseInt(document.getElementById('set_injFee').value);
            cfg.drugs.forEach((d, i) => { if(d.is50) calc50(i); });
            renderDrugs();
        }

        function moveDrug(idx, dir) {
            const newIdx = idx + dir;
            if(newIdx < 0 || newIdx >= cfg.drugs.length) return;
            const temp = cfg.drugs[idx];
            cfg.drugs[idx] = cfg.drugs[newIdx];
            cfg.drugs[newIdx] = temp;
            renderDrugs();
        }

        function renderMatrix() {
            const c = document.getElementById('matrixContainer');
            let h = `<table class="w-full"><thead><tr><th class="p-3">약제</th>` + diags.map(d => `<th class="p-3">${d}</th>`).join('') + `</tr></thead><tbody>`;
            cfg.drugs.forEach(drug => {
                if(drug.name === 'Avastin') return;
                h += `<tr><td class="font-black bg-slate-50 text-sm text-left pl-4" style="color:${drug.color}">${drug.name}</td>`;
                diags.forEach(diag => {
                    const st = cfg.matrix[diag][drug.name] || "X";
                    h += `<td><select onchange="cfg.matrix['${diag}']['${drug.name}']=this.value" class="text-xs border rounded p-1 font-bold w-full">
                        <option value="R" ${st==='R'?'selected':''}>급여</option>
                        <option value="O" ${st==='O'?'selected':''}>비급</option>
                        <option value="X" ${st==='X'?'selected':''}>X</option>
                    </select></td>`;
                });
                h += `</tr>`;
            });
            c.innerHTML = h + `</tbody></table>`;
        }

        function addDrug() {
            cfg.drugs.push({ name: "신규약제", price:0, payR:0, payN:0, is50:false, hasProgram:true, color: '#1e293b' });
            diags.forEach(d => { if(!cfg.matrix[d]) cfg.matrix[d]={}; cfg.matrix[d]["신규약제"]="X"; });
            renderDrugs(); renderMatrix();
        }

        function saveConfig() {
            cfg.hospRate = parseFloat(document.getElementById('set_hospRate').value);
            cfg.injFee = parseInt(document.getElementById('set_injFee').value);
            localStorage.setItem('opht_cfg_v28', JSON.stringify(cfg));
            updateUI(); closeModal();
        }

        function handleExport() {
            // 시술료 및 기관 정보 최신화 후 저장
            cfg.hospRate = parseFloat(document.getElementById('set_hospRate').value);
            cfg.injFee = parseInt(document.getElementById('set_injFee').value);
            
            const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `OphtWorkstation_Config_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function handleImport(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => { 
                cfg = JSON.parse(ev.target.result); 
                localStorage.setItem('opht_cfg_v28', JSON.stringify(cfg));
                location.reload(); 
            };
            r.readAsText(f);
        }
    </script>
